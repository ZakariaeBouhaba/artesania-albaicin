<main>
    <section class="carrusel">
 
        <button class="carrusel-btn prev" onclick="moverCarrusel(-1)">&#10094;</button>
    
        <div class="carrusel-wrapper">
            <div class="carrusel-track" id="carruselTrack">
    
                <!-- SLIDE 1: cambia src por tu imagen -->
                <div class="carrusel-slide">
                    <img src="img/pollo.png" alt="Imagen 1">
                </div>
    
                <!-- SLIDE 2: cambia src por tu imagen -->
                <div class="carrusel-slide">
                    <img src="img/pollo.png" alt="Imagen 2">
                </div>
    
                <!-- SLIDE 3: cambia src por tu imagen -->
                <div class="carrusel-slide">
                    <img src="img/pollo.png" alt="Imagen 3">
                </div>
    
                <!-- SLIDE 4: cambia src por tu imagen -->
                <div class="carrusel-slide">
                    <img src="img/pollo.png" alt="Imagen 4">
                </div>
    
            </div>
        </div>
    
        <button class="carrusel-btn next" onclick="moverCarrusel(1)">&#10095;</button>
    
        <div class="carrusel-dots">
            <span class="dot activo" onclick="irASlide(0)"></span>
            <span class="dot" onclick="irASlide(1)"></span>
            <span class="dot" onclick="irASlide(2)"></span>
            <span class="dot" onclick="irASlide(3)"></span>
        </div>
    
    </section>
